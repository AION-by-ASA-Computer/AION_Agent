# Docusaurus con baseUrl=/docs/ (pubblico: https://host/docs/)
#
# Dopo il build, le pagine stanno sotto ``build/docs/`` mentre gli asset hashed
# stanno in ``build/assets/`` e ``build/img/``. Nei puntano a ``/docs/assets/…``
# e ``/docs/img/…``: questo ``alias`` mappa sul disco corretto.
#
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ^~ /docs/assets/ {
        alias /usr/share/nginx/html/assets/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ^~ /docs/img/ {
        alias /usr/share/nginx/html/img/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /docs/sitemap.xml {
        alias /usr/share/nginx/html/sitemap.xml;
        add_header Cache-Control "public, max-age=600, must-revalidate";
    }

    location = /docs/markdown-page {
        return 302 /docs/markdown-page/;
    }

    location ^~ /docs/markdown-page/ {
        alias /usr/share/nginx/html/markdown-page/;
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    location = /docs/404.html {
        alias /usr/share/nginx/html/404.html;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate";
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
