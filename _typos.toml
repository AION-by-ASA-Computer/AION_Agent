[default]
extend-ignore-re = [
  # Italian/technical tokens and project names
  "ACI",
  "AIN",
  "Caddy",
  "Haystack",
  "MemPalace",
  "PromQL",
  "SQLite",
  "stdio",
  "subagent",
  "subagents",
  "unm",
]

[files]
extend-exclude = [
  "mcp_servers_std/",
  "data/",
  "node_modules/",
  "*.png",
  "*.jpg",
  "*.woff",
  "*.woff2",
  "*.ttf",
]
