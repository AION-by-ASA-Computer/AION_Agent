# Dependabot: weekly dependency update PRs.
# npm/pnpm ecosystems omitted until pnpm-lock.yaml is tracked in git.
# Enable in GitHub: Settings → Security → Advanced Security
# (Dependabot alerts; security updates are often always-on for public repos).

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      pip-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: "/sdk/python"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: chore
      include: scope
