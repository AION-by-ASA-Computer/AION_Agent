name: AION CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

# Cancel redundant runs on the same PR branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend Linting and Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Configure Environment and Sync MCP/Config
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv run python scripts/setup_core.py --non-interactive --skip-promo-playwright

      - name: Lint (Ruff)
        run: |
          uv pip install ruff
          uv run ruff check --config ruff.toml src/
          uv run ruff format --check --config ruff.toml src/

      - name: Check no runtime data/ tracked in git
        run: uv run python scripts/check_data_git_tracking.py

      - name: Run CI pytest suite
        env:
          AION_CHAT_PASSWORD_AUTH: "0"
          AION_ADMIN_PASSWORD_AUTH: "0"
          AION_REDIS_FALLBACK_LOCAL: "1"
        run: |
          uv pip install pytest pytest-asyncio
          chmod +x scripts/run_ci_tests.sh
          ./scripts/run_ci_tests.sh

  frontend-checks:
    name: Frontend Packages Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('chat-ui/package.json', 'admin-ui/package.json', 'website/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install and build Chat UI
        run: |
          cd chat-ui
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Build Admin UI
        run: |
          cd admin-ui
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Build Website (Docusaurus)
        run: |
          cd website
          pnpm install --no-frozen-lockfile
          pnpm build

  security-scan:
    name: Security Vulnerability Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run Trivy filesystem scan
        # Pin SHA (v0.35.0) — do not use mutable version tags (supply-chain risk).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  docker-build-checks:
    name: Test Docker Builds
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Sync config before image build
        run: |
          uv venv .venv-ci
          source .venv-ci/bin/activate
          uv pip install -r requirements.txt
          uv run python scripts/setup_core.py --non-interactive --skip-promo-playwright

      - name: Build Backend Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: aion-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Chat UI Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.chat-ui
          push: false
          tags: aion-chat-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin UI Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.admin-ui
          push: false
          tags: aion-admin-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Website Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile.website
          push: false
          tags: aion-website:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
