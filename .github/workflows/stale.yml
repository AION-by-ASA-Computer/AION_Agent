name: Stale

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    name: Mark Stale Items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark and close stale issues and PRs
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been marked stale due to 60 days of inactivity.
            It will be closed in 14 days unless there is new activity or the
            stale label is removed.
          close-issue-message: >
            Closing due to prolonged inactivity. Feel free to reopen with
            updated context if this is still relevant.
          stale-pr-message: >
            This pull request has been marked stale due to 30 days of inactivity.
            It will be closed in 14 days unless there is new activity.
          close-pr-message: >
            Closing due to prolonged inactivity. Reopen or open a fresh PR if you
            want to continue this work.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security,release
          operations-per-run: 100
