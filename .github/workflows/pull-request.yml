name: Pull Request

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-title:
    name: Semantic PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Conventional Commits PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            perf
            refactor
            revert
            test
            build
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title must use Conventional Commits (e.g. feat:, fix:, docs:, chore:).
            See CONTRIBUTING.md. Title text after the type should start lowercase.
          ignoreLabels: |
            dependencies
            dependabot
