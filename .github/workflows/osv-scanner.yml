name: OSV-Scanner

on:
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]
  schedule:
    - cron: "30 12 * * 1"
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # PR delta scan — uploads SARIF to Code Scanning (must run on pull_request).
  osv-scan:
    name: OSV-Scanner PR
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@fa4ff678dd5d0a4fa3d628e57af8162873e93cd6 # main (export-results=false)
    with:
      export-results: false

  # Full scan on main / weekly — logs + fail-on-vuln; no SARIF upload (avoids a
  # second Code Scanning config that PRs cannot satisfy).
  osv-scan-scheduled:
    name: OSV-Scanner Scheduled
    if: github.event_name == 'schedule' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@fa4ff678dd5d0a4fa3d628e57af8162873e93cd6 # main (export-results=false)
    with:
      upload-sarif: false
      export-results: false
