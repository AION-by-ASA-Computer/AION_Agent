name: OSV-Scanner PR Scan

on:
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan-pr:
    name: OSV-Scanner PR
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
