name: Repository Governance

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Install actionlint
        run: bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7

      - name: Lint GitHub Actions workflows
        run: ./actionlint -color

  typos:
    name: Typos Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Check spelling
        uses: crate-ci/typos@v1.47.2
        with:
          files: |
            ./README.md
            ./CONTRIBUTING.md
            ./SECURITY.md
            ./CHANGELOG.md
            ./NOTICE
            ./AGENTS.md
            ./docs/opensource
            ./.github/workflows
            ./.github/dependabot.yml
            ./.github/BRANCH_PROTECTION.md
            ./.github/pull_request_template.md
            ./security-insights.yml
