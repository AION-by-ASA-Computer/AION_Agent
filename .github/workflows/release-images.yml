name: Publish container images

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: aion-by-asa-computer

jobs:
  build-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: aion-backend
            file: docker/Dockerfile.backend
            build_args: ""
          - image: aion-chat-ui
            file: docker/Dockerfile.chat-ui
            build_args: |
              NEXT_PUBLIC_AION_API_URL=/api
              NEXT_PUBLIC_AION_ADMIN_UI_URL=/admin
          - image: aion-admin-ui
            file: docker/Dockerfile.admin-ui
            build_args: |
              NEXT_PUBLIC_AION_API_URL=/api
          - image: aion-website
            file: docker/Dockerfile.website
            build_args: |
              DOCUSAURUS_BASE_URL=/docs/
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Parse release version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
