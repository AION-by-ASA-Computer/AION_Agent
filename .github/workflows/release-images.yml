name: Publish container images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-images-${{ github.event.release.tag_name || inputs.tag_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: aion-by-asa-computer

jobs:
  build-push:
    name: Build and push ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: aion-backend
            file: docker/Dockerfile.backend
            build_args: ""
          - image: aion-chat-ui
            file: docker/Dockerfile.chat-ui
            build_args: |
              NEXT_PUBLIC_AION_API_URL=/api
              NEXT_PUBLIC_AION_ADMIN_UI_URL=/admin
          - image: aion-admin-ui
            file: docker/Dockerfile.admin-ui
            build_args: |
              NEXT_PUBLIC_AION_API_URL=/api
          - image: aion-website
            file: docker/Dockerfile.website
            build_args: |
              DOCUSAURUS_BASE_URL=/docs/
    steps:
      - name: Parse release version
        id: ver
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          TAG="${RELEASE_TAG}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: $TAG (expected vX.Y.Z)" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          # No GHA cache on release builds: multi-arch + mode=max often fails with
          # "error writing layer blob: not_found" during cache export (flaky GHA cache API).
          # PR CI still caches via docker-build-checks in ci.yml.
