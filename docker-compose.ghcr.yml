# Pull pre-built application images from GitHub Container Registry (GHCR).
#
# Sandbox image is NOT published — build locally when needed:
#   docker compose --profile sandbox-build build sandbox
#
# Usage:
#   cp .env.example .env
#   ./scripts/setup-aion-env.sh --docker
#   AION_VERSION=0.1.0 docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   AION_VERSION=0.1.0 docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d --no-build
#
# Pin a version in production (avoid relying on :latest). See docs/opensource/releases.md.

name: aion-agent

services:
  backend:
    image: ghcr.io/aion-by-asa-computer/aion-backend:${AION_VERSION:-0.1.0}

  chat-ui:
    image: ghcr.io/aion-by-asa-computer/aion-chat-ui:${AION_VERSION:-0.1.0}

  admin-ui:
    image: ghcr.io/aion-by-asa-computer/aion-admin-ui:${AION_VERSION:-0.1.0}

  website:
    image: ghcr.io/aion-by-asa-computer/aion-website:${AION_VERSION:-0.1.0}
